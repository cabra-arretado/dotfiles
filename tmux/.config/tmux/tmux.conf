######################
###### BATMAN ########
######################

#  Modes
setw -g mode-style 'fg=colour8 bg=colour0 bold'
setw -g window-status-style 'fg=colour8 bg=colour0'

# Panes
set -g pane-border-style 'fg=colour8'
set -g pane-active-border-style 'fg=colour8'

# Status Bar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour0 fg=colour8 dim'

# Tmux logo <<<<
set -g status-left '#[fg=colour232, bg=colour1 bold] TMUX #[bg=colour0] '
set -g status-left-length 20

# Date/time >>>>
set -g status-right '#[fg=colour3,bg=colour0] %d-%m-%y #[fg=colour3,bg=colour0] %H:%M:%S '
set -g status-right-length 50

# Selected window
setw -g window-status-current-style 'fg=colour4 bg=colour0 bold'
setw -g window-status-current-format ' #I #[fg=colour3 bold]#[fg=colour3 bold]#W#[fg=colour3 bold] [#F] '

# Non-selected window
setw -g window-status-style 'fg=colour8 bg=colour0'
setw -g window-status-format ' #I#[fg=colour0] #[fg=colour3]#W#[fg=colour8] #F '

setw -g window-status-bell-style 'fg=colour3 bg=colour0 bold'

# Messages 
set -g message-style 'fg=colour3 bg=colour0 bold'

#######################
### VIM-TMUX CONFIG ###
#######################
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version = 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

